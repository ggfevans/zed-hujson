name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  query-audit:
    name: Query Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Zed queries against pinned grammar revision
        run: scripts/check-queries.sh

  extension-build:
    name: Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build WASM extension
        run: cargo build --release --target wasm32-wasip2

      - name: Verify WASM artefact
        run: test -f target/wasm32-wasip2/release/zed_hujson.wasm

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt

      - name: Clippy
        run: cargo clippy --target wasm32-wasip2 -- -D warnings

      - name: Rustfmt
        run: cargo fmt -- --check
